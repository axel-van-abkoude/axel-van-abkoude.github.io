title: The Lost Harddrive
email: axel@vanabkou.de
description: Blogs about
# I want to land on a home page and afterwards the user can decide to go to the blogs or posts
baseurl: ""
url: https://axel.vanabkou.de # the base hostname & protocol for your site, e.g. http://example.com

github_username: axel-van-abkoude

markdown: kramdown
theme: minima
# Specify a _<collection> folder
collections:
  posts:
    output: true
    permalink: /posts/:title
  drafts:
    output: false
    permalink: /drafts/:title

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-gist
  - jemoji

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
